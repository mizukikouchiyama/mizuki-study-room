<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Study Room MVP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }
    /* スマホ縦画面: 縦分割レイアウト（Canvas上部 + コントロールデッキ下部） */
    @media (orientation: portrait) {
      body {
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
      }
      #canvas {
        width: 100vw !important;
        flex-shrink: 0;
      }
      /* コントロールデッキ表示 */
      #control-deck {
        display: flex !important;
      }
    }
    /* PC/横画面: 従来通り中央配置 */
    @media (orientation: landscape) {
      body {
        align-items: center;
        justify-content: center;
      }
    }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(5,5,15,0.97);
      display: flex; justify-content: center; align-items: center;
      z-index: 100;
    }
    .login-box {
      background: #0e0e22; border: 2px solid #2255cc;
      padding: 44px 52px; text-align: center; min-width: 320px; position: relative;
    }
    .login-box::before {
      content:''; position:absolute; inset:5px;
      border:1px solid rgba(40,80,200,0.25); pointer-events:none;
    }
    .login-title    { font-size:22px; letter-spacing:8px; color:#4488ff; margin-bottom:4px; }
    .login-subtitle { font-size:10px; letter-spacing:4px; color:#334466; margin-bottom:32px; }
    .login-label    { font-size:10px; letter-spacing:2px; color:#556688; margin-bottom:8px; text-align:left; }
    #nameInput {
      background:#080814; border:1px solid #2244aa; color:#aaccff;
      font-family:'Courier New',monospace; font-size:15px;
      padding:10px 14px; width:100%; margin-bottom:18px;
      outline:none; letter-spacing:2px; transition:border-color 0.2s;
    }
    #nameInput:focus { border-color:#4488ff; }
    #joinBtn {
      background:#2255cc; border:none; color:#fff;
      font-family:'Courier New',monospace; font-size:12px;
      letter-spacing:4px; padding:12px 0; cursor:pointer; width:100%;
      transition:background 0.15s;
    }
    #joinBtn:hover  { background:#3366dd; }
    #joinBtn:active { background:#1144bb; }
    /* pixelated + crisp でドット感・テキストシャープを保証 */
    #canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ===== スマホ用タッチUI（横画面フォールバック用） ===== */
    #touch-ui {
      display: none; /* JS で isTouchDevice の場合に flex に切替 */
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }
    /* 縦画面ではタッチUIをコントロールデッキに統合するので非表示 */
    @media (orientation: portrait) {
      #touch-ui { display: none !important; }
    }

    /* ジョイスティック外枠 — 左下 */
    #joystick-zone {
      position: absolute;
      left: 24px;
      bottom: 28px;
      width: 110px;
      height: 110px;
      pointer-events: all;
      touch-action: none;
    }
    #joystick-base {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.28);
    }
    #joystick-stick {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(80,160,255,0.75);
      border: 2px solid rgba(140,200,255,0.90);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: background 0.1s;
      pointer-events: none;
    }

    /* FOCUSボタン — 右下 */
    #focus-btn {
      position: absolute;
      right: 24px;
      bottom: 36px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(30,30,60,0.75);
      border: 2px solid rgba(100,150,255,0.60);
      color: #aaccff;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #focus-btn.active {
      background: rgba(180,20,20,0.80);
      border-color: rgba(255,100,100,0.90);
      color: #ffcccc;
    }

    /* ===== コントロールデッキ（スマホ縦画面のみ表示） ===== */
    #control-deck {
      display: none;
      flex: 1;
      flex-direction: column;
      position: relative;
      background: linear-gradient(180deg, #0a0a1a 0%, #0d1025 40%, #101230 100%);
      border-top: 2px solid rgba(34,85,204,0.40);
      overflow: hidden;
    }
    /* デッキ上部の装飾ライン */
    #control-deck::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(68,136,255,0.30), transparent);
    }
    /* デッキ内レイアウト */
    #deck-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
    }
    /* デッキ内ジョイスティック */
    #deck-joystick-zone {
      width: 120px;
      height: 120px;
      position: relative;
      pointer-events: all;
      touch-action: none;
      flex-shrink: 0;
    }
    #deck-joystick-base {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(100,150,255,0.30);
    }
    #deck-joystick-stick {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(80,160,255,0.65);
      border: 2px solid rgba(140,200,255,0.80);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: background 0.1s;
      pointer-events: none;
    }
    /* デッキ中央 — ステータス表示 */
    #deck-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    #deck-status-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(100,130,200,0.60);
      text-transform: uppercase;
    }
    #deck-status-value {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #44cc88;
      transition: color 0.2s;
    }
    #deck-status-value.focus {
      color: #ff5555;
    }
    #deck-online {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(68,255,136,0.70);
    }
    /* デッキ右側 — ボタン群 */
    #deck-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
      align-items: center;
    }
    #deck-focus-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(20,20,50,0.80);
      border: 2px solid rgba(100,150,255,0.50);
      color: #aaccff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    #deck-focus-btn.active {
      background: rgba(180,20,20,0.80);
      border-color: rgba(255,100,100,0.80);
      color: #ffcccc;
    }
    #deck-chat-btn {
      padding: 8px 16px;
      background: rgba(14, 14, 34, 0.90);
      border: 1px solid rgba(34,85,204,0.60);
      color: #aaccff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      pointer-events: all;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      transition: background 0.15s;
    }
    #deck-chat-btn:active {
      background: rgba(34,85,204,0.40);
    }
    #deck-chat-badge {
      background: #cc2828; color: #fff;
      font-size: 8px; padding: 1px 4px;
      border-radius: 6px; margin-left: 4px;
      font-weight: bold;
    }
    /* デッキ底部のSafe Area対応 */
    #deck-safe-bottom {
      flex-shrink: 0;
      height: env(safe-area-inset-bottom, 0px);
      background: #0a0a1a;
    }

    /* ===== Chat System ===== */
    #chat-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 320px;
      max-width: 85vw;
      background: rgba(8, 8, 20, 0.95);
      border-left: 2px solid #2255cc;
      z-index: 60;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      font-family: 'Courier New', Courier, monospace;
    }
    #chat-panel.open { transform: translateX(0); }
    #chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #2244aa;
      flex-shrink: 0;
    }
    #chat-tabs { display: flex; gap: 4px; }
    .chat-tab {
      background: transparent;
      border: 1px solid #334466;
      color: #556688;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chat-tab.active {
      background: #2255cc;
      border-color: #4488ff;
      color: #fff;
    }
    #chat-close {
      background: none; border: none;
      color: #556688; font-size: 20px;
      cursor: pointer; padding: 4px 8px;
      font-family: 'Courier New', monospace;
    }
    #chat-close:hover { color: #ff4444; }
    #dm-selector {
      padding: 8px 12px;
      border-bottom: 1px solid #1a2244;
      flex-shrink: 0;
    }
    #dm-target {
      width: 100%;
      background: #080814;
      border: 1px solid #2244aa;
      color: #aaccff;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    #chat-messages::-webkit-scrollbar-thumb { background: #2255cc; border-radius: 3px; }
    .chat-msg {
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }
    .chat-msg .msg-name { font-weight: bold; margin-right: 6px; }
    .chat-msg.global .msg-name { color: #44cc88; }
    .chat-msg.dm .msg-name { color: #ff79c6; }
    .chat-msg.dm-sent .msg-name { color: #bd93f9; }
    .chat-msg .msg-text { color: #ccd6f6; }
    .chat-msg .msg-time { color: #334466; font-size: 9px; margin-left: 6px; }
    .chat-msg.system { color: #556688; font-style: italic; font-size: 11px; }
    #chat-input-area {
      display: flex;
      padding: 8px 12px;
      gap: 6px;
      border-top: 1px solid #2244aa;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      background: #080814;
      border: 1px solid #2244aa;
      color: #aaccff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      letter-spacing: 1px;
    }
    #chat-input:focus { border-color: #4488ff; }
    #chat-send {
      background: #2255cc; border: none; color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 2px;
      padding: 8px 14px; cursor: pointer;
    }
    #chat-send:hover { background: #3366dd; }
    #chat-toggle {
      position: fixed;
      bottom: 80px; right: 12px;
      background: rgba(14, 14, 34, 0.90);
      border: 2px solid #2255cc;
      color: #aaccff;
      font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 2px;
      padding: 10px 16px;
      cursor: pointer; z-index: 55;
      display: none;
      transition: background 0.15s;
    }
    #chat-toggle:hover { background: rgba(34, 85, 204, 0.40); }
    #chat-badge {
      background: #cc2828; color: #fff;
      font-size: 9px; padding: 2px 5px;
      border-radius: 8px; margin-left: 6px;
      font-weight: bold;
    }

    /* ===== スマホ縦画面用レスポンシブ ===== */
    @media (max-width: 768px) and (orientation: portrait) {
      /* チャットパネル: ボトムシート形式（コントロールデッキの上にオーバーレイ） */
      #chat-panel {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-width: 100vw;
        height: 50vh;
        border-left: none;
        border-top: 2px solid #2255cc;
        border-radius: 12px 12px 0 0;
        transform: translateY(100%);
      }
      #chat-panel.open {
        transform: translateY(0);
      }
      /* PC用のチャットトグルは縦画面で非表示（デッキ内ボタンを使用） */
      #chat-toggle {
        display: none !important;
      }
      /* チャット入力を安全エリア対応 */
      #chat-input-area {
        padding-bottom: max(8px, env(safe-area-inset-bottom));
      }
      /* ログインボックスをスマホ幅に合わせる */
      .login-box {
        min-width: unset;
        width: 85vw;
        max-width: 360px;
        padding: 32px 28px;
      }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="login-box">
      <h1 class="login-title">STUDY ROOM</h1>
      <p class="login-subtitle">HIGH-FLOOR WORKSPACE</p>
      <p class="login-label">YOUR NAME</p>
      <input id="nameInput" type="text" maxlength="12"
             placeholder="ENTER NAME..." autocomplete="off" spellcheck="false"/>
      <button id="joinBtn">ENTER ROOM</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <!-- スマホ用タッチUI（JS で表示制御） -->
  <div id="touch-ui">
    <!-- バーチャルジョイスティック（左下） -->
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-stick"></div>
    </div>
    <!-- FOCUSボタン（右下） -->
    <button id="focus-btn">FOCUS</button>
  </div>

  <!-- コントロールデッキ（スマホ縦画面用） -->
  <div id="control-deck">
    <div id="deck-content">
      <!-- 左: ジョイスティック -->
      <div id="deck-joystick-zone">
        <div id="deck-joystick-base"></div>
        <div id="deck-joystick-stick"></div>
      </div>
      <!-- 中央: ステータス -->
      <div id="deck-status">
        <div id="deck-status-label">STATUS</div>
        <div id="deck-status-value">NORMAL</div>
        <div id="deck-online">▶ 1 ONLINE</div>
      </div>
      <!-- 右: ボタン群 -->
      <div id="deck-buttons">
        <button id="deck-focus-btn">FOCUS</button>
        <button id="deck-chat-btn">CHAT<span id="deck-chat-badge" style="display:none;">0</span></button>
      </div>
    </div>
    <div id="deck-safe-bottom"></div>
  </div>

  <!-- Chat System -->
  <div id="chat-panel">
    <div id="chat-header">
      <div id="chat-tabs">
        <button class="chat-tab active" data-tab="global">GLOBAL</button>
        <button class="chat-tab" data-tab="dm">DM</button>
      </div>
      <button id="chat-close">&times;</button>
    </div>
    <div id="dm-selector" style="display:none;">
      <select id="dm-target">
        <option value="">-- SELECT USER --</option>
      </select>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" maxlength="200"
             placeholder="Type a message..." autocomplete="off" spellcheck="false" />
      <button id="chat-send">SEND</button>
    </div>
  </div>
  <button id="chat-toggle">CHAT<span id="chat-badge" style="display:none;">0</span></button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  'use strict';

  // ============================================================
  //  定数
  // ============================================================
  const GAME_WIDTH   = 960;
  const GAME_HEIGHT  = 540;
  const PLAYER_SPEED = 150;
  const PLAYER_SIZE  = 14;
  const LERP_SPEED   = 11;
  const SEND_THRESHOLD = 0.5;

  // レイアウト — 余白ゼロ、壁なし
  const CEIL_Y    = 80;   // 天井ライン（最小限）
  const WALL_L    = 0;    // 左端 = 画面端
  const WALL_R    = 960;  // 右端 = 画面端
  const WINDOW_Y1 = 80;   // 窓上端
  const WINDOW_Y2 = 300;  // 窓下端
  const SILL_H    = 14;   // 窓台厚み
  const FLOOR_Y   = WINDOW_Y2 + SILL_H; // 床開始 = 314

  // ============================================================
  //  Canvas / DPI セットアップ
  // ============================================================
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  function setupCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const isPortrait = window.innerHeight > window.innerWidth;

    let cssW, cssH;
    if (isPortrait) {
      // スマホ縦画面: 幅100%でアスペクト比維持
      // heightはCSSのflex-shrink:0で固定され、残りがコントロールデッキに割り当てられる
      cssW = window.innerWidth;
      cssH = Math.round(cssW * (GAME_HEIGHT / GAME_WIDTH));
    } else {
      // PC/横画面: 従来通り、ウィンドウに収まる最大サイズ
      const cssScale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
      cssW = Math.round(GAME_WIDTH  * cssScale);
      cssH = Math.round(GAME_HEIGHT * cssScale);
    }

    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
    // 物理バッファ (高DPI)
    canvas.width  = Math.round(GAME_WIDTH  * dpr);
    canvas.height = Math.round(GAME_HEIGHT * dpr);
    // 論理座標系にスケーリング
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // アンチエイリアス完全無効
    ctx.imageSmoothingEnabled = false;
  }

  // ============================================================
  //  ポートレート判定ヘルパー
  // ============================================================
  function isPortraitMode() {
    return window.innerHeight > window.innerWidth;
  }
  setupCanvas();
  window.addEventListener('resize', setupCanvas);

  // ============================================================
  //  ゲーム状態
  // ============================================================
  let socket = null, localPlayer = null;
  const remotePlayers = new Map();
  let lastTime = 0, lastSentX = 0, lastSentY = 0;

  // ============================================================
  //  Bot NPC 状態管理
  // ============================================================
  const botNPC = {
    active: false,
    x: 480,           // 後列中央の机
    y: 380,
    name: 'TOPIK Bot',
    status: 'normal',
    botStatus: 'idle',   // idle | working | done
    botMessage: '',
    doneTimer: 0,        // done 表示の残り時間(ms)
  };

  const keys = { up:false, down:false, left:false, right:false };

  // ============================================================
  //  チャット状態管理
  // ============================================================
  let chatOpen = false;
  let chatTab = 'global';  // 'global' | 'dm'
  let unreadGlobal = 0;
  let unreadDM = 0;
  const globalMessages = [];
  const dmMessages = [];
  const MAX_CHAT_MESSAGES = 100;
  let chatInputFocused = false;

  document.addEventListener('keydown', (e) => {
    // チャット入力中はゲーム操作を無効化
    if(chatInputFocused){
      if(e.key==='Enter'){ sendChatMessage(); e.preventDefault(); }
      if(e.key==='Escape'){ toggleChat(); e.preventDefault(); }
      return;
    }
    // Enterでチャット開閉
    if(e.key==='Enter' && localPlayer){
      toggleChat(); e.preventDefault(); return;
    }

    switch(e.code){
      case 'ArrowUp':    case 'KeyW': keys.up    = true; break;
      case 'ArrowDown':  case 'KeyS': keys.down  = true; break;
      case 'ArrowLeft':  case 'KeyA': keys.left  = true; break;
      case 'ArrowRight': case 'KeyD': keys.right = true; break;
      case 'Space':
        if(!e.repeat && localPlayer){
          localPlayer.status = localPlayer.status==='normal'?'focus':'normal';
          socket.emit('status_change',{status:localPlayer.status});
        }
        e.preventDefault(); break;
    }
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', (e) => {
    switch(e.code){
      case 'ArrowUp':    case 'KeyW': keys.up    = false; break;
      case 'ArrowDown':  case 'KeyS': keys.down  = false; break;
      case 'ArrowLeft':  case 'KeyA': keys.left  = false; break;
      case 'ArrowRight': case 'KeyD': keys.right = false; break;
    }
  });

  // ============================================================
  //  タッチ操作（スマホ用バーチャルジョイスティック）
  // ============================================================

  /**
   * タッチデバイス検出。
   * ポインターがタッチ対応なら UI を表示する。
   */
  /**
   * ジョイスティックを指定要素に初期化する汎用関数
   */
  function setupJoystick(zone, stick, radius, dead) {
    let joyActive = false;

    function updateJoy(touchX, touchY) {
      const rect = zone.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = touchX - cx;
      let dy = touchY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > radius) { dx = dx / dist * radius; dy = dy / dist * radius; }
      stick.style.transform = `translate(calc(-50% + ${Math.round(dx)}px), calc(-50% + ${Math.round(dy)}px))`;
      keys.left = dx < -dead;
      keys.right = dx > dead;
      keys.up = dy < -dead;
      keys.down = dy > dead;
    }

    function resetJoy() {
      stick.style.transform = 'translate(-50%, -50%)';
      keys.up = keys.down = keys.left = keys.right = false;
      joyActive = false;
    }

    zone.addEventListener('touchstart', (e) => { e.preventDefault(); joyActive = true; updateJoy(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    zone.addEventListener('touchmove', (e) => { e.preventDefault(); if (joyActive) updateJoy(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    zone.addEventListener('touchend', (e) => { e.preventDefault(); resetJoy(); }, { passive: false });
    zone.addEventListener('touchcancel', (e) => { e.preventDefault(); resetJoy(); }, { passive: false });
  }

  /**
   * FOCUSボタンのトグル処理
   */
  function handleFocusToggle(btn) {
    if (!localPlayer) return;
    localPlayer.status = localPlayer.status === 'normal' ? 'focus' : 'normal';
    socket.emit('status_change', { status: localPlayer.status });
    // 全FOCUSボタンの見た目を同期
    document.querySelectorAll('#focus-btn, #deck-focus-btn').forEach(b => {
      b.classList.toggle('active', localPlayer.status === 'focus');
    });
    updateDeckStatus();
  }

  /**
   * デッキのステータス表示を更新
   */
  function updateDeckStatus() {
    const sv = document.getElementById('deck-status-value');
    const so = document.getElementById('deck-online');
    if (!sv) return;
    if (localPlayer) {
      const isFocus = localPlayer.status === 'focus';
      sv.textContent = isFocus ? '● FOCUS' : '○ NORMAL';
      sv.classList.toggle('focus', isFocus);
    }
    const total = remotePlayers.size + (localPlayer ? 1 : 0) + (botNPC.active ? 1 : 0);
    if (so) so.textContent = `▶ ${total} ONLINE`;
  }

  /**
   * デッキ内のチャットバッジ同期
   */
  function updateDeckChatBadge() {
    const badge = document.getElementById('deck-chat-badge');
    if (!badge) return;
    const total = unreadGlobal + unreadDM;
    if (total > 0) {
      badge.textContent = total > 99 ? '99+' : total;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }

  function initTouchUI() {
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    if (!isTouch) return;

    if (isPortraitMode()) {
      // ---- 縦画面: コントロールデッキ内のジョイスティック ----
      const deckZone = document.getElementById('deck-joystick-zone');
      const deckStick = document.getElementById('deck-joystick-stick');
      setupJoystick(deckZone, deckStick, 36, 8);

      // デッキ内FOCUSボタン
      const deckFocusBtn = document.getElementById('deck-focus-btn');
      deckFocusBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleFocusToggle(deckFocusBtn);
      }, { passive: false });

      // デッキ内CHATボタン
      document.getElementById('deck-chat-btn').addEventListener('click', toggleChat);

    } else {
      // ---- 横画面: 従来のフローティングUI ----
      const touchUI = document.getElementById('touch-ui');
      touchUI.style.display = 'block';

      const zone = document.getElementById('joystick-zone');
      const stick = document.getElementById('joystick-stick');
      setupJoystick(zone, stick, 33, 8);

      const focusBtn = document.getElementById('focus-btn');
      focusBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleFocusToggle(focusBtn);
      }, { passive: false });
    }
  }

  // ============================================================
  //  ゲームループ
  // ============================================================
  function gameLoop(timestamp) {
    if(lastTime===0) lastTime=timestamp;
    const dt = Math.min((timestamp-lastTime)/1000, 0.05);
    lastTime = timestamp;

    if(localPlayer){
      let dx=0,dy=0;
      if(keys.up)    dy-=1;
      if(keys.down)  dy+=1;
      if(keys.left)  dx-=1;
      if(keys.right) dx+=1;
      const len=Math.sqrt(dx*dx+dy*dy);
      if(len>0){dx/=len;dy/=len;}
      localPlayer.x+=dx*PLAYER_SPEED*dt;
      localPlayer.y+=dy*PLAYER_SPEED*dt;
      const half=PLAYER_SIZE/2;
      localPlayer.x=Math.max(8+half, Math.min(GAME_WIDTH-8-half, localPlayer.x));
      localPlayer.y=Math.max(FLOOR_Y+10, Math.min(GAME_HEIGHT-half, localPlayer.y));
      if(Math.abs(localPlayer.x-lastSentX)>SEND_THRESHOLD ||
         Math.abs(localPlayer.y-lastSentY)>SEND_THRESHOLD){
        socket.emit('move',{x:localPlayer.x,y:localPlayer.y});
        lastSentX=localPlayer.x; lastSentY=localPlayer.y;
      }
    }
    remotePlayers.forEach((rp)=>{
      const f=1-Math.exp(-LERP_SPEED*dt);
      rp.currentX+=(rp.targetX-rp.currentX)*f;
      rp.currentY+=(rp.targetY-rp.currentY)*f;
    });
    // Bot NPC の done タイマー処理
    if(botNPC.active && botNPC.doneTimer>0 && Date.now()>botNPC.doneTimer){
      botNPC.doneTimer=0;
      botNPC.botMessage='';
      botNPC.botStatus='idle';
      botNPC.status='normal';
    }
    render();
    updateDeckStatus();
    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  //  描画メイン
  // ============================================================
  function render() {
    ctx.fillStyle='#c8c4be';
    ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);

    drawCeiling();
    drawWindow();
    drawWindowSill();
    drawFloor();
    drawFloorShadow();
    // 后列→前列の順で机と人物を描画
    drawDesks();
    // Bot NPCを描画（他プレイヤーの前に描画 = 机に近い位置）
    drawBotNPC();
    remotePlayers.forEach((rp)=>{
      drawAvatar(Math.round(rp.currentX),Math.round(rp.currentY),rp.name,rp.status,false);
    });
    if(localPlayer){
      drawAvatar(Math.round(localPlayer.x),Math.round(localPlayer.y),localPlayer.name,localPlayer.status,true);
    }
    drawHUD();
  }

  // ============================================================
  //  天井（極薄）
  // ============================================================
  function drawCeiling(){
    const g=ctx.createLinearGradient(0,0,0,CEIL_Y);
    g.addColorStop(0,'#eeebe5'); g.addColorStop(1,'#dedad4');
    ctx.fillStyle=g; ctx.fillRect(0,0,GAME_WIDTH,CEIL_Y);
    // テクスチャ縦線
    ctx.strokeStyle='rgba(175,165,155,0.28)'; ctx.lineWidth=1;
    for(let x=0;x<GAME_WIDTH;x+=8){
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CEIL_Y);ctx.stroke();
    }
    // ダウンライト
    [160,370,590,800].forEach(lx=>{
      const glow=ctx.createRadialGradient(lx,CEIL_Y-10,0,lx,CEIL_Y+18,80);
      glow.addColorStop(0,'rgba(255,245,215,0.50)');
      glow.addColorStop(0.5,'rgba(255,245,215,0.14)');
      glow.addColorStop(1,'rgba(255,245,215,0)');
      ctx.fillStyle=glow; ctx.fillRect(lx-80,CEIL_Y-14,160,110);
      ctx.fillStyle='#f0ece4';
      ctx.beginPath();ctx.arc(lx,CEIL_Y-5,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fffef8';
      ctx.beginPath();ctx.arc(lx,CEIL_Y-5,3,0,Math.PI*2);ctx.fill();
    });
    // 天井ライン
    ctx.strokeStyle='rgba(140,130,120,0.55)'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,CEIL_Y);ctx.lineTo(GAME_WIDTH,CEIL_Y);ctx.stroke();
  }

  // ============================================================
  //  大窓（y=80〜300、横幅フル）
  // ============================================================
  function drawWindow(){
    const wx=0, wy=WINDOW_Y1, ww=GAME_WIDTH, wh=WINDOW_Y2-WINDOW_Y1; // 220px

    // 空
    const skyG=ctx.createLinearGradient(wx,wy,wx,wy+wh*0.5);
    skyG.addColorStop(0,'#5bacd8'); skyG.addColorStop(0.35,'#82cae8');
    skyG.addColorStop(0.65,'#a8e0f4'); skyG.addColorStop(1,'#c2ecfb');
    ctx.fillStyle=skyG; ctx.fillRect(wx,wy,ww,wh*0.52);

    drawClouds(wx,wy,ww,wh*0.5,Date.now());
    drawMountains(wx,wy+wh*0.52,ww,wh);

    // 海
    const seaG=ctx.createLinearGradient(wx,wy+wh*0.52,wx,wy+wh);
    seaG.addColorStop(0,'#4fa4c6'); seaG.addColorStop(0.5,'#4090b4');
    seaG.addColorStop(1,'#356e9e');
    ctx.fillStyle=seaG; ctx.fillRect(wx,wy+wh*0.52,ww,wh*0.48);
    drawSeaGlitter(wx,wy+wh*0.52,ww,wh*0.48,Date.now());

    // 窓枠（黒・6px）
    const fw=6;
    ctx.fillStyle='#161616';
    ctx.fillRect(wx,wy,ww,fw);                   // 上枠
    ctx.fillRect(wx,wy,fw,wh);                   // 左枠
    ctx.fillRect(wx+ww-fw,wy,fw,wh);             // 右枠
    // 縦桟5本（6区画）
    for(let i=1;i<=5;i++){
      ctx.fillRect(wx+Math.round(ww/6*i)-3,wy,6,wh);
    }
    // 横桟1本
    ctx.fillRect(wx,wy+Math.round(wh*0.52)-3,ww,6);

    // ガラス光沢
    const gloss=ctx.createLinearGradient(wx,wy,wx+ww*0.2,wy+wh);
    gloss.addColorStop(0,'rgba(255,255,255,0.04)');
    gloss.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=gloss; ctx.fillRect(wx,wy,ww,wh);
  }

  function drawClouds(wx,wy,ww,wh,t){
    const clouds=[
      {bx:0.03,by:0.08,w:0.17,h:0.30,spd:0.55},
      {bx:0.26,by:0.04,w:0.21,h:0.38,spd:0.38},
      {bx:0.52,by:0.10,w:0.14,h:0.26,spd:0.65},
      {bx:0.70,by:0.03,w:0.19,h:0.34,spd:0.46},
    ];
    clouds.forEach(c=>{
      const drift=((t*0.008*c.spd)%(ww*1.5))/ww;
      const cx=wx+((c.bx+drift)%1.2)*ww;
      const cy=wy+c.by*wh;
      const cw=Math.round(c.w*ww), ch=Math.round(c.h*wh);
      ctx.fillStyle='rgba(195,215,232,0.32)';
      ctx.fillRect(Math.round(cx)+4,Math.round(cy)+3,cw,ch);
      ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.fillRect(Math.round(cx),Math.round(cy),cw,ch);
      ctx.fillStyle='rgba(255,255,255,0.99)';
      ctx.fillRect(Math.round(cx)+4,Math.round(cy)+2,Math.round(cw*0.55),Math.round(ch*0.38));
    });
  }

  function drawMountains(wx,baseY,ww){
    const mtns=[
      [0.00,55],[0.09,72],[0.20,50],[0.30,68],
      [0.44,60],[0.55,76],[0.66,52],[0.76,66],[0.87,56],
    ];
    ctx.fillStyle='#88b6cc';
    mtns.forEach(([rx,rh],i)=>{
      const mw=ww*0.19;
      const x=wx+rx*ww;
      ctx.beginPath();
      ctx.moveTo(Math.round(x),Math.round(baseY));
      ctx.lineTo(Math.round(x+mw*0.5),Math.round(baseY-rh));
      ctx.lineTo(Math.round(x+mw),Math.round(baseY));
      ctx.closePath(); ctx.fill();
    });
    const hazeG=ctx.createLinearGradient(wx,baseY-80,wx,baseY);
    hazeG.addColorStop(0,'rgba(180,215,235,0)');
    hazeG.addColorStop(1,'rgba(180,215,235,0.40)');
    ctx.fillStyle=hazeG; ctx.fillRect(wx,baseY-80,ww,80);
  }

  function drawSeaGlitter(wx,wy,ww,wh,t){
    [0.07,0.16,0.27,0.37,0.46,0.57,0.65,0.74,0.83,0.92].forEach((rx,i)=>{
      const alpha=0.28+0.48*Math.abs(Math.sin(t/700+i*1.3));
      ctx.fillStyle=`rgba(255,255,200,${alpha.toFixed(2)})`;
      const gx=Math.round(wx+rx*ww), gy=Math.round(wy+wh*(0.18+(i%3)*0.22));
      ctx.fillRect(gx,gy,3,1); ctx.fillRect(gx-1,gy,1,1); ctx.fillRect(gx+3,gy,1,1);
    });
  }

  // ============================================================
  //  窓台
  // ============================================================
  function drawWindowSill(){
    const sx=0, sy=WINDOW_Y2, sw=GAME_WIDTH, sh=SILL_H;
    const sillG=ctx.createLinearGradient(sx,sy,sx,sy+sh);
    sillG.addColorStop(0,'#e6e2da'); sillG.addColorStop(1,'#d2cec6');
    ctx.fillStyle=sillG; ctx.fillRect(sx,sy,sw,sh);
    ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.fillRect(sx,sy+sh-4,sw,4);
    ctx.fillStyle='#141414'; ctx.fillRect(sx,sy-3,sw,6); // 下枠フレーム
  }

  // ============================================================
  //  ダークウッドフローリング（FLOOR_Y〜画面下端、横幅フル）
  // ============================================================
  function drawFloor(){
    const fx=0, fy=FLOOR_Y, fw=GAME_WIDTH, fh=GAME_HEIGHT-fy;

    // 基本グラデーション
    const baseG=ctx.createLinearGradient(fx,fy,fx,GAME_HEIGHT);
    baseG.addColorStop(0,'#6a4530'); baseG.addColorStop(0.3,'#5a3820');
    baseG.addColorStop(0.7,'#4a2e18'); baseG.addColorStop(1,'#3a2210');
    ctx.fillStyle=baseG; ctx.fillRect(fx,fy,fw,fh);

    // 板（奥行きパース：奥=細, 手前=太）
    const pitchFar=7, pitchNear=13;
    const boardColors=['#5a3c26','#623e28','#523618','#5e3c22','#4e3014'];
    let y=fy, rowIdx=0;
    while(y<GAME_HEIGHT){
      const ratio=(y-fy)/fh;
      const pitch=Math.round(pitchFar+(pitchNear-pitchFar)*ratio);
      ctx.fillStyle=boardColors[rowIdx%boardColors.length];
      ctx.fillRect(fx,y,fw,pitch);
      // 溝
      ctx.fillStyle='rgba(0,0,0,0.38)'; ctx.fillRect(fx,y,fw,1);
      // 木目縦筋
      ctx.fillStyle='rgba(0,0,0,0.06)';
      for(let g=0;g<28;g++){
        const gx=(g*26+rowIdx*11)%fw;
        ctx.fillRect(gx,y+1,1,pitch-2);
      }
      // 継ぎ目
      ctx.fillStyle='rgba(0,0,0,0.17)';
      const ox=rowIdx%2===0?0:fw/4;
      for(let s=ox;s<fw;s+=fw/3.5) ctx.fillRect(s,y,1,pitch);
      y+=pitch; rowIdx++;
    }

    // 窓からの光の帯（6区画分）
    for(let i=0;i<6;i++){
      const bx1=GAME_WIDTH/6*i+6, bx2=GAME_WIDTH/6*(i+1)-6;
      const lw=bx2-bx1;
      const lg=ctx.createLinearGradient(bx1+lw/2,fy,bx1+lw/2,GAME_HEIGHT);
      lg.addColorStop(0,'rgba(255,245,210,0.10)');
      lg.addColorStop(0.4,'rgba(255,245,210,0.06)');
      lg.addColorStop(1,'rgba(255,245,210,0.02)');
      ctx.fillStyle=lg; ctx.fillRect(bx1,fy,lw,GAME_HEIGHT-fy);
    }
    // 光沢
    const sheen=ctx.createLinearGradient(0,fy,fw,fy);
    sheen.addColorStop(0,'rgba(255,240,200,0)');
    sheen.addColorStop(0.15,'rgba(255,240,200,0.04)');
    sheen.addColorStop(0.5,'rgba(255,240,200,0.07)');
    sheen.addColorStop(0.85,'rgba(255,240,200,0.04)');
    sheen.addColorStop(1,'rgba(255,240,200,0)');
    ctx.fillStyle=sheen; ctx.fillRect(0,fy,fw,GAME_HEIGHT-fy);

    // 幅木（左右端）
    ctx.fillStyle='#dedad3';
    ctx.fillRect(0,GAME_HEIGHT-10,GAME_WIDTH,10);
    ctx.strokeStyle='rgba(130,120,110,0.4)'; ctx.lineWidth=1;
    ctx.strokeRect(0.5,GAME_HEIGHT-10,GAME_WIDTH-1,9);
  }

  function drawFloorShadow(){
    const sg=ctx.createLinearGradient(0,FLOOR_Y,0,FLOOR_Y+36);
    sg.addColorStop(0,'rgba(0,0,0,0.22)'); sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,FLOOR_Y,GAME_WIDTH,36);
  }

  // ============================================================
  //  机 6個（後列3・前列3）横幅フルに均等配置
  //  後列: topY=345, w=160, depth=30, legH=40
  //  前列: topY=425, w=185, depth=36, legH=50
  //  列X中心: 160, 480, 800（全幅960を3分割）
  // ============================================================
  function drawDesks(){
    const cols=[160,480,800];
    cols.forEach(cx=>drawSingleDesk(cx,345,160,30,40,true));
    cols.forEach(cx=>drawSingleDesk(cx,425,185,36,50,false));
  }

  function drawSingleDesk(cx,topY,w,depth,legH,isBack){
    const x=cx-w/2, y=topY;
    const legY=y+depth;

    // 床の影（楕円）
    const sg=ctx.createRadialGradient(cx,legY+legH,0,cx,legY+legH,w*0.52);
    sg.addColorStop(0,'rgba(0,0,0,0.32)');
    sg.addColorStop(0.5,'rgba(0,0,0,0.12)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg; ctx.fillRect(x-18,legY+legH-7,w+36,22);

    // 脚2本
    const legW=isBack?5:6;
    const lc1=isBack?'#1c1408':'#221808', lc2=isBack?'#2c2010':'#342c1a';
    [[x+10,legY],[x+w-10-legW,legY]].forEach(([lx,ly])=>{
      const lg=ctx.createLinearGradient(lx,0,lx+legW,0);
      lg.addColorStop(0,lc1); lg.addColorStop(0.5,lc2); lg.addColorStop(1,lc1);
      ctx.fillStyle=lg; ctx.fillRect(lx,ly,legW,legH);
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(lx-1,ly+legH-2,legW+2,2);
    });

    // 天板手前面
    const ffH=Math.round(depth*0.25);
    const ffG=ctx.createLinearGradient(0,y+depth-ffH,0,y+depth);
    ffG.addColorStop(0,isBack?'rgba(0,0,0,0.26)':'rgba(0,0,0,0.30)');
    ffG.addColorStop(1,'rgba(0,0,0,0.08)');
    ctx.fillStyle=ffG; ctx.fillRect(x,y+depth-ffH,w,ffH);

    // 天板
    const tc=isBack?['#3a2a18','#302216','#281a10']:['#422e1c','#382818','#30200e'];
    const tg=ctx.createLinearGradient(x,y,x+w,y);
    tg.addColorStop(0,tc[2]); tg.addColorStop(0.08,tc[0]);
    tg.addColorStop(0.5,tc[1]); tg.addColorStop(0.92,tc[0]); tg.addColorStop(1,tc[2]);
    ctx.fillStyle=tg; ctx.fillRect(x,y,w,depth);
    // 木目
    ctx.fillStyle='rgba(0,0,0,0.07)';
    for(let g=8;g<w-8;g+=18) ctx.fillRect(x+g,y+2,1,depth-4);
    // ハイライト
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(x+2,y+1,w-4,2);
    ctx.strokeStyle=isBack?'#1a100a':'#201408'; ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,w-1,depth-1);

    // モニター
    const mw=isBack?96:112, mh=isBack?32:38;
    drawMonitor(cx-mw/2,y-mh-(isBack?4:5),mw,mh,isBack);
    // キーボード
    const kw=isBack?68:80;
    drawKeyboard(cx-kw/2,y+Math.round(depth*0.30),kw,isBack);
    // マウス
    drawMouse(cx+kw/2+(isBack?4:5),y+Math.round(depth*0.30),isBack);
    // ランプ（前列のみ）
    if(!isBack) drawDeskLamp(x+w-30,y-2);
  }

  function drawMonitor(x,y,w,h,small){
    const sH=h-(small?7:8);
    const stW=8, stH=small?5:6, stX=Math.round(x+w/2-4);
    ctx.fillStyle='#181818';
    ctx.fillRect(stX,y+sH,stW,stH);
    ctx.fillRect(stX-(small?6:8),y+sH+stH-3,stW+(small?12:16),3);
    ctx.fillStyle='#0d0d0d'; ctx.fillRect(x,y,w,sH);
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,w-1,sH-1);
    drawMonitorScreen(x+2,y+2,w-4,sH-4,small);
  }

  function drawMonitorScreen(x,y,w,h,small){
    ctx.fillStyle='#1e1e2e'; ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#161622'; ctx.fillRect(x,y,Math.round(w*0.16),h);
    ctx.fillStyle='#12121e'; ctx.fillRect(x,y,w,4);
    [['#ff5f56',2],['#ffbd2e',6],['#27c93f',10]].forEach(([c,ox])=>{
      ctx.fillStyle=c; ctx.fillRect(x+Math.round(w*0.16)+ox+2,y+1,3,3);
    });
    const lc=['#ff79c6','#bd93f9','#8be9fd','#50fa7b','#ffb86c','#f1fa8c','#6272a4','#8be9fd'];
    const ind=[0,6,10,14,10,6,0,6];
    for(let i=0;i<7;i++){
      const ly=y+5+i*(small?4:5); if(ly+2>y+h) break;
      const lw=Math.min(6+(i*11%20),w*0.7);
      ctx.fillStyle=lc[i%lc.length];
      ctx.fillRect(x+Math.round(w*0.16)+3+ind[i],ly,Math.round(lw),2);
      if(lw<w*0.45){
        ctx.fillStyle=lc[(i+3)%lc.length];
        ctx.fillRect(x+Math.round(w*0.16)+3+ind[i]+Math.round(lw)+2,ly,Math.round(lw*0.45),2);
      }
    }
    if(Math.floor(Date.now()/500)%2===0){
      ctx.fillStyle='#f8f8f2';
      ctx.fillRect(x+Math.round(w*0.16)+22,y+(small?21:26),1,small?3:4);
    }
    ctx.fillStyle='rgba(255,255,255,0.015)';
    ctx.fillRect(x,y,w,Math.round(h/2));
  }

  function drawKeyboard(x,y,w,small){
    const h=small?12:14;
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='#333'; ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
    ctx.fillStyle='#262626';
    const cols=small?11:13;
    for(let r=0;r<3;r++) for(let c=0;c<cols-r;c++)
      ctx.fillRect(x+2+c*(small?4:5)+r*(small?1:2),y+2+r*(small?3:4),small?3:4,small?2:3);
    ctx.fillStyle='#222';
    ctx.fillRect(x+Math.round(w*0.22),y+h-4,Math.round(w*0.56),small?2:3);
  }

  function drawMouse(x,y,small){
    const mw=small?8:10, mh=small?11:13;
    ctx.fillStyle='#1e1e1e'; ctx.fillRect(x,y,mw,mh);
    ctx.strokeStyle='#333'; ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,mw-1,mh-1);
    ctx.strokeStyle='#2a2a2a';
    ctx.beginPath(); ctx.moveTo(x+Math.round(mw/2),y+1); ctx.lineTo(x+Math.round(mw/2),y+5); ctx.stroke();
    ctx.fillStyle='#252525'; ctx.fillRect(x+Math.round(mw/2)-1,y+3,2,3);
  }

  function drawDeskLamp(x,y){
    ctx.fillStyle='#1c1c1c'; ctx.fillRect(x-5,y+26,10,4);
    ctx.strokeStyle='#282828'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,y+26); ctx.lineTo(x-2,y+14); ctx.lineTo(x+7,y+6); ctx.stroke();
    ctx.fillStyle='#c09050'; ctx.fillRect(x+3,y+2,18,7);
    ctx.strokeStyle='#806030'; ctx.lineWidth=1;
    ctx.strokeRect(x+3.5,y+2.5,17,6);
    const lg=ctx.createRadialGradient(x+12,y+9,0,x+12,y+9,35);
    lg.addColorStop(0,'rgba(255,230,150,0.18)'); lg.addColorStop(1,'rgba(255,230,150,0)');
    ctx.fillStyle=lg; ctx.fillRect(x-18,y+5,54,46);
  }

  // ============================================================
  //  人型ピクセルアートアバター
  //
  //  構成（中心Xを基準に、フッターY=yに足元を揃える）:
  //    頭    : 8×8px
  //    首    : 2×2px
  //    胴体  : 8×8px
  //    腕左右: 各3×6px
  //    脚左右: 各3×8px
  //
  //  合計高さ: 8+2+8+8 = 26px、足元Y=y
  // ============================================================
  function drawAvatar(x, y, name, status, isLocal) {
    const isFocus = (status === 'focus');

    // --- 色テーマ ---
    const bodyColor  = isFocus ? '#cc2828' : (isLocal ? '#2255cc' : '#1f9955');
    const skinColor  = isFocus ? '#e88888' : (isLocal ? '#aabbff' : '#aaffcc');
    const shadowColor= 'rgba(0,0,0,0.28)';
    const outlineColor= isFocus ? '#ff7070' : (isLocal ? '#6699ff' : '#44cc88');

    // 集中モードのオーラ
    if(isFocus){
      const p=0.5+0.5*Math.sin(Date.now()/380);
      ctx.strokeStyle=`rgba(255,50,50,${(0.22+p*0.28).toFixed(2)})`;
      ctx.lineWidth=2; ctx.strokeRect(x-14,y-30,28,34);
      ctx.strokeStyle=`rgba(255,80,80,${(0.08+p*0.10).toFixed(2)})`;
      ctx.lineWidth=3; ctx.strokeRect(x-18,y-34,36,42);
    }

    // 足元の影
    ctx.fillStyle=shadowColor;
    ctx.fillRect(x-7,y,14,3);

    // --- 脚（左: x-5〜x-2, 右: x+2〜x+5） ---
    ctx.fillStyle=bodyColor;
    ctx.fillRect(x-5, y-8,  3, 8); // 左脚
    ctx.fillRect(x+2,  y-8,  3, 8); // 右脚
    // 靴（1px 暗め）
    ctx.fillStyle=isFocus?'#880000':(isLocal?'#112288':'#116644');
    ctx.fillRect(x-6, y-2, 4, 2); // 左靴
    ctx.fillRect(x+2,  y-2, 4, 2); // 右靴

    // --- 胴体（8×8） ---
    ctx.fillStyle=bodyColor;
    ctx.fillRect(x-4, y-16, 8, 8);
    // 胴体ハイライト
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(x-3, y-15, 6, 2);
    // 胴体枠
    ctx.strokeStyle=outlineColor; ctx.lineWidth=1;
    ctx.strokeRect(x-4+0.5, y-16+0.5, 7, 7);

    // --- 腕（左: x-7〜x-5, 右: x+4〜x+6）---
    ctx.fillStyle=bodyColor;
    ctx.fillRect(x-7, y-16, 3, 6); // 左腕
    ctx.fillRect(x+4,  y-16, 3, 6); // 右腕
    // 手
    ctx.fillStyle=skinColor;
    ctx.fillRect(x-7, y-11, 3, 2); // 左手
    ctx.fillRect(x+4,  y-11, 3, 2); // 右手

    // --- 首（2×2） ---
    ctx.fillStyle=skinColor;
    ctx.fillRect(x-1, y-18, 2, 2);

    // --- 頭（8×8） ---
    ctx.fillStyle=skinColor;
    ctx.fillRect(x-4, y-26, 8, 8);
    // 頭の枠
    ctx.strokeStyle=outlineColor; ctx.lineWidth=1;
    ctx.strokeRect(x-4+0.5, y-26+0.5, 7, 7);
    // 目（各2×2）
    ctx.fillStyle=isFocus?'#cc0000':(isLocal?'#001166':'#003322');
    ctx.fillRect(x-3, y-23, 2, 2); // 左目
    ctx.fillRect(x+1,  y-23, 2, 2); // 右目
    // 口
    if(isFocus){
      ctx.fillStyle='#661111';
      ctx.fillRect(x-2, y-19, 4, 1); // 一文字
    } else {
      ctx.fillStyle=isLocal?'#334499':'#226644';
      ctx.fillRect(x-2, y-19, 1, 1); // 左
      ctx.fillRect(x+1,  y-19, 1, 1); // 右
      ctx.fillRect(x-1, y-18, 2, 1); // 中
    }
    // 髪（頭上1px帯）
    ctx.fillStyle=isFocus?'#661111':(isLocal?'#112299':'#115533');
    ctx.fillRect(x-4, y-26, 8, 2);

    // --- 名前テキスト（頭上3px）---
    // ctx は DPR スケーリング済みのため、整数座標＋monospace で完全シャープ
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    // 黒縁取り
    ctx.fillStyle = 'rgba(0,0,0,0.95)';
    for(let ox=-1;ox<=1;ox++) for(let oy=-1;oy<=1;oy++){
      if(ox===0&&oy===0) continue;
      ctx.fillText(name, x+ox, y-26-3+oy);
    }
    ctx.fillStyle = isFocus?'#ffaaaa':(isLocal?'#99bbff':'#88ffcc');
    ctx.fillText(name, x, y-26-3);

    // FOCUSバッジ
    if(isFocus){
      ctx.font='bold 8px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
      const bw=34, bh=12, bx2=x-bw/2, by=y+4;
      ctx.fillStyle='#aa1818'; ctx.fillRect(bx2,by,bw,bh);
      ctx.strokeStyle='#ff5555'; ctx.lineWidth=1;
      ctx.strokeRect(bx2+0.5,by+0.5,bw-1,bh-1);
      ctx.fillStyle='#fff'; ctx.fillText('FOCUS',x,by+2);
    }
  }

  // ============================================================
  //  Bot NPC 描画（紫色の専用キャラクター + 吹き出し）
  // ============================================================
  function drawBotNPC() {
    if (!botNPC.active) return;

    const x = Math.round(botNPC.x);
    const y = Math.round(botNPC.y);
    const isWorking = botNPC.botStatus === 'working';
    const isDone = botNPC.botStatus === 'done';

    // --- 色テーマ（紫ベース）---
    const bodyColor   = isWorking ? '#cc2828' : '#8844cc';
    const skinColor   = isWorking ? '#e88888' : '#ccaaff';
    const outlineColor= isWorking ? '#ff7070' : '#aa77ff';

    // 集中モードのオーラ（working時）
    if (isWorking) {
      const p = 0.5 + 0.5 * Math.sin(Date.now() / 380);
      ctx.strokeStyle = `rgba(255,50,50,${(0.22 + p * 0.28).toFixed(2)})`;
      ctx.lineWidth = 2; ctx.strokeRect(x - 14, y - 30, 28, 34);
      ctx.strokeStyle = `rgba(255,80,80,${(0.08 + p * 0.10).toFixed(2)})`;
      ctx.lineWidth = 3; ctx.strokeRect(x - 18, y - 34, 36, 42);
    }

    // 足元の影
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(x - 7, y, 14, 3);

    // 脚
    ctx.fillStyle = bodyColor;
    ctx.fillRect(x - 5, y - 8, 3, 8);
    ctx.fillRect(x + 2, y - 8, 3, 8);
    // 靴
    ctx.fillStyle = isWorking ? '#880000' : '#442266';
    ctx.fillRect(x - 6, y - 2, 4, 2);
    ctx.fillRect(x + 2, y - 2, 4, 2);

    // 胴体
    ctx.fillStyle = bodyColor;
    ctx.fillRect(x - 4, y - 16, 8, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x - 3, y - 15, 6, 2);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = 1;
    ctx.strokeRect(x - 4 + 0.5, y - 16 + 0.5, 7, 7);

    // 腕
    ctx.fillStyle = bodyColor;
    ctx.fillRect(x - 7, y - 16, 3, 6);
    ctx.fillRect(x + 4, y - 16, 3, 6);
    // 手
    ctx.fillStyle = skinColor;
    ctx.fillRect(x - 7, y - 11, 3, 2);
    ctx.fillRect(x + 4, y - 11, 3, 2);

    // 首
    ctx.fillStyle = skinColor;
    ctx.fillRect(x - 1, y - 18, 2, 2);

    // 頭
    ctx.fillStyle = skinColor;
    ctx.fillRect(x - 4, y - 26, 8, 8);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = 1;
    ctx.strokeRect(x - 4 + 0.5, y - 26 + 0.5, 7, 7);
    // 目（ロボット風の光る目）
    ctx.fillStyle = isWorking ? '#ff0000' : '#ff44ff';
    ctx.fillRect(x - 3, y - 23, 2, 2);
    ctx.fillRect(x + 1, y - 23, 2, 2);
    // 口（直線 = ロボット風）
    ctx.fillStyle = isWorking ? '#661111' : '#553388';
    ctx.fillRect(x - 2, y - 19, 4, 1);
    // 髪（アンテナ風）
    ctx.fillStyle = isWorking ? '#661111' : '#553388';
    ctx.fillRect(x - 4, y - 26, 8, 2);
    // アンテナ
    ctx.fillStyle = '#aa77ff';
    ctx.fillRect(x - 1, y - 29, 2, 3);
    ctx.fillRect(x - 2, y - 30, 4, 2);

    // --- 名前テキスト ---
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(0,0,0,0.95)';
    for (let ox = -1; ox <= 1; ox++) for (let oy = -1; oy <= 1; oy++) {
      if (ox === 0 && oy === 0) continue;
      ctx.fillText('TOPIK Bot', x + ox, y - 26 - 3 + oy);
    }
    ctx.fillStyle = '#ddaaff';
    ctx.fillText('TOPIK Bot', x, y - 26 - 3);

    // --- 吹き出し（botMessage がある場合）---
    if (botNPC.botMessage) {
      drawBotBubble(x, y - 40, botNPC.botMessage, isWorking, isDone);
    }

    // FOCUS バッジ (working 時)
    if (isWorking) {
      ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      const bw = 34, bh = 12, bx2 = x - bw / 2, by = y + 4;
      ctx.fillStyle = '#aa1818'; ctx.fillRect(bx2, by, bw, bh);
      ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 1;
      ctx.strokeRect(bx2 + 0.5, by + 0.5, bw - 1, bh - 1);
      ctx.fillStyle = '#fff'; ctx.fillText('WORK', x, by + 2);
    }
  }

  function drawBotBubble(x, y, message, isWorking, isDone) {
    ctx.font = 'bold 9px monospace';
    const textWidth = ctx.measureText(message).width;
    const pw = textWidth + 16;
    const ph = 18;
    const px = x - pw / 2;
    const py = y - ph - 8;

    // 吹き出し背景
    const bgColor = isDone ? 'rgba(34,120,60,0.92)' : (isWorking ? 'rgba(160,30,30,0.90)' : 'rgba(60,30,100,0.85)');
    const borderColor = isDone ? '#44cc88' : (isWorking ? '#ff5555' : '#aa77ff');

    ctx.fillStyle = bgColor;
    ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 0.5, py + 0.5, pw - 1, ph - 1);

    // 三角形（吹き出しの尻尾）
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.moveTo(x - 4, py + ph);
    ctx.lineTo(x, py + ph + 5);
    ctx.lineTo(x + 4, py + ph);
    ctx.closePath();
    ctx.fill();

    // テキスト
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(message, x, py + ph / 2);
  }

  // ============================================================
  //  HUD — 4隅にシャープなピクセルテキスト
  //  ctx は DPR スケーリング済み。整数座標+monospaceで完全鮮明。
  // ============================================================
  function drawHUD(){
    const total=remotePlayers.size+(localPlayer?1:0)+(botNPC.active?1:0);
    const PAD=6; // フレーム端からのパディング

    // ---- 左上: ▶ N ONLINE ----
    const onlineTxt=`\u25B6 ${total} ONLINE`;
    ctx.font='bold 11px monospace';
    ctx.textAlign='left'; ctx.textBaseline='top';
    const onlineW=Math.round(ctx.measureText(onlineTxt).width);
    // 背景パネル
    ctx.fillStyle='rgba(0,0,0,0.62)';
    ctx.fillRect(PAD, PAD, onlineW+PAD*2, 20);
    ctx.strokeStyle='rgba(44,100,220,0.50)'; ctx.lineWidth=1;
    ctx.strokeRect(PAD+0.5, PAD+0.5, onlineW+PAD*2-1, 19);
    // テキスト（整数座標）
    ctx.fillStyle='#44ff88';
    ctx.fillText(onlineTxt, PAD+PAD, PAD+5);

    // ---- 右上: STUDY ROOM MVP ----
    const titleTxt='STUDY ROOM MVP';
    ctx.font='bold 10px monospace';
    ctx.textAlign='right'; ctx.textBaseline='top';
    const titleW=Math.round(ctx.measureText(titleTxt).width);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(GAME_WIDTH-PAD-titleW-PAD*2, PAD, titleW+PAD*2, 18);
    ctx.fillStyle='rgba(160,185,255,0.85)';
    ctx.fillText(titleTxt, GAME_WIDTH-PAD-PAD, PAD+4);

    // ---- 下部中央: 操作ガイド ----
    const hintTxt='WASD : Move    SPACE : Focus    ENTER : Chat';
    ctx.font='9px monospace';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    const hintW=Math.round(ctx.measureText(hintTxt).width);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(Math.round(GAME_WIDTH/2-hintW/2-PAD), GAME_HEIGHT-PAD-16, hintW+PAD*2, 14);
    ctx.fillStyle='rgba(160,168,218,0.88)';
    ctx.fillText(hintTxt, GAME_WIDTH/2, GAME_HEIGHT-PAD-4);

    // ---- 右下: ステータス ----
    if(localPlayer){
      const isFocus=localPlayer.status==='focus';
      const stTxt=isFocus?'\u25CF FOCUS MODE':'\u25CB NORMAL';
      ctx.font='bold 10px monospace';
      ctx.textAlign='right'; ctx.textBaseline='bottom';
      const stW=Math.round(ctx.measureText(stTxt).width);
      ctx.fillStyle='rgba(0,0,0,0.55)';
      ctx.fillRect(GAME_WIDTH-PAD-stW-PAD*2, GAME_HEIGHT-PAD-18, stW+PAD*2, 16);
      ctx.fillStyle=isFocus?'#ff5555':'#44cc88';
      ctx.fillText(stTxt, GAME_WIDTH-PAD-PAD, GAME_HEIGHT-PAD-4);
    }
  }

  // ============================================================
  //  チャット機能
  // ============================================================

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function toggleChat() {
    const panel = document.getElementById('chat-panel');
    chatOpen = !chatOpen;
    panel.classList.toggle('open', chatOpen);
    if (chatOpen) {
      // 未読リセット（現在のタブ）
      if (chatTab === 'global') unreadGlobal = 0;
      else unreadDM = 0;
      updateChatBadge();
      renderMessages();
      setTimeout(() => { document.getElementById('chat-input').focus(); }, 100);
    } else {
      document.getElementById('chat-input').blur();
    }
  }

  function switchChatTab(tab) {
    chatTab = tab;
    document.querySelectorAll('.chat-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.getElementById('dm-selector').style.display = (tab === 'dm') ? 'block' : 'none';
    // 未読リセット
    if (tab === 'global') unreadGlobal = 0;
    else unreadDM = 0;
    updateChatBadge();
    renderMessages();
  }

  function renderMessages() {
    const container = document.getElementById('chat-messages');
    const msgs = (chatTab === 'global') ? globalMessages : dmMessages;
    container.innerHTML = msgs.map(m => {
      const cls = m.isSelf ? (m.type === 'dm' ? 'dm-sent' : 'global') : m.type;
      const prefix = (m.type === 'dm' && m.isSelf) ? `TO ${escapeHtml(m.targetName)}` : escapeHtml(m.name);
      return `<div class="chat-msg ${cls}"><span class="msg-name">${prefix}</span><span class="msg-text">${escapeHtml(m.text)}</span><span class="msg-time">${formatTime(m.timestamp)}</span></div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !socket) return;

    if (chatTab === 'dm') {
      const targetId = document.getElementById('dm-target').value;
      if (!targetId) { input.placeholder = 'Select a user first!'; setTimeout(() => { input.placeholder = 'Type a message...'; }, 1500); return; }
      socket.emit('dm_message', { text, targetId });
    } else {
      socket.emit('chat_message', { text });
    }
    input.value = '';
  }

  function updateDMSelector() {
    const sel = document.getElementById('dm-target');
    const current = sel.value;
    sel.innerHTML = '<option value="">-- SELECT USER --</option>';
    remotePlayers.forEach((rp, id) => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = rp.name;
      sel.appendChild(opt);
    });
    // 以前の選択を復元
    if (current && remotePlayers.has(current)) sel.value = current;
  }

  function updateChatBadge() {
    const badge = document.getElementById('chat-badge');
    const total = unreadGlobal + unreadDM;
    if (total > 0) {
      badge.textContent = total > 99 ? '99+' : total;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
    updateDeckChatBadge();
  }

  function showNotification(sender, text) {
    if (Notification.permission !== 'granted') return;
    try {
      const n = new Notification('Study Room - ' + sender, {
        body: text.slice(0, 100),
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>',
        tag: 'study-room-chat',
      });
      n.onclick = () => {
        window.focus();
        if (!chatOpen) toggleChat();
        n.close();
      };
      setTimeout(() => n.close(), 5000);
    } catch(e) { /* Safari等で失敗しても無視 */ }
  }

  // ============================================================
  //  Socket.io
  // ============================================================
  function initSocket(name){
    socket=io();
    socket.on('connect',()=>{
      const spawnX=200+Math.random()*560;
      const spawnY=460+Math.random()*50;
      localPlayer={x:spawnX,y:spawnY,name,status:'normal'};
      lastSentX=spawnX; lastSentY=spawnY;
      socket.emit('join',{x:spawnX,y:spawnY,name});
    });
    socket.on('init',(players)=>{
      players.forEach(p=>{
        if(p.id===socket.id)return;
        if(p.id==='__topik_bot__'){
          botNPC.active=true;
          botNPC.x=p.x; botNPC.y=p.y;
          botNPC.status=p.status;
          botNPC.botStatus=p.botStatus||'idle';
          botNPC.botMessage=p.botMessage||'';
          return;
        }
        remotePlayers.set(p.id,{
          currentX:p.x,currentY:p.y,targetX:p.x,targetY:p.y,
          name:p.name,status:p.status
        });
      });
      updateDMSelector();
    });
    socket.on('player_joined',(p)=>{
      if(p.id==='__topik_bot__'){
        botNPC.active=true;
        botNPC.x=p.x; botNPC.y=p.y;
        botNPC.status=p.status;
        botNPC.botStatus=p.botStatus||'idle';
        botNPC.botMessage=p.botMessage||'';
        return;
      }
      remotePlayers.set(p.id,{
        currentX:p.x,currentY:p.y,targetX:p.x,targetY:p.y,
        name:p.name,status:p.status
      });
      updateDMSelector();
    });
    socket.on('player_moved',(data)=>{
      const rp=remotePlayers.get(data.id);
      if(rp){rp.targetX=data.x;rp.targetY=data.y;}
    });
    socket.on('player_status',(data)=>{
      const rp=remotePlayers.get(data.id);
      if(rp) rp.status=data.status;
    });
    socket.on('player_left',(data)=>{
      if(data.id==='__topik_bot__'){
        botNPC.active=false;
        botNPC.botStatus='idle';
        botNPC.botMessage='';
        return;
      }
      remotePlayers.delete(data.id);
      updateDMSelector();
    });

    // Bot NPC ステータス更新
    socket.on('bot_status',(data)=>{
      botNPC.active=true;
      botNPC.status=data.status;
      botNPC.botStatus=data.botStatus;
      botNPC.botMessage=data.botMessage||'';
      if(data.botStatus==='done'){
        botNPC.doneTimer=Date.now()+10000;
      }
    });

    // ---- チャット: 全体メッセージ受信 ----
    socket.on('chat_message',(msg)=>{
      const isSelf=(msg.id===socket.id);
      globalMessages.push({name:msg.name,text:msg.text,timestamp:msg.timestamp,type:'global',isSelf});
      if(globalMessages.length>MAX_CHAT_MESSAGES) globalMessages.shift();
      if(chatOpen && chatTab==='global') renderMessages();
      else { unreadGlobal++; updateChatBadge(); }
      if(!isSelf && document.hidden) showNotification(msg.name,msg.text);
    });

    // ---- チャット: DM受信 ----
    socket.on('dm_message',(msg)=>{
      const isSelf=(msg.id===socket.id);
      dmMessages.push({name:msg.name,text:msg.text,timestamp:msg.timestamp,type:'dm',isSelf,targetName:msg.targetName});
      if(dmMessages.length>MAX_CHAT_MESSAGES) dmMessages.shift();
      if(chatOpen && chatTab==='dm') renderMessages();
      else { unreadDM++; updateChatBadge(); }
      if(!isSelf && document.hidden) showNotification(msg.name+' (DM)',msg.text);
    });
  }

  // ============================================================
  //  入室フォーム
  // ============================================================
  document.getElementById('joinBtn').addEventListener('click',()=>{
    const ni=document.getElementById('nameInput');
    const name=ni.value.trim();
    if(!name){
      ni.style.borderColor='#ff4444';
      setTimeout(()=>{ni.style.borderColor='#2244aa';},700);
      return;
    }
    document.getElementById('overlay').style.display='none';
    document.getElementById('chat-toggle').style.display='block'; // チャットボタン表示
    initSocket(name);
    initTouchUI();           // タッチデバイスならジョイスティックを有効化
    requestAnimationFrame(gameLoop);
    // プッシュ通知の権限リクエスト
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  });
  document.getElementById('nameInput').addEventListener('keydown',(e)=>{
    if(e.key==='Enter') document.getElementById('joinBtn').click();
  });
  window.addEventListener('load',()=>{document.getElementById('nameInput').focus();});

  // ============================================================
  //  チャットUIイベントリスナー
  // ============================================================
  document.getElementById('chat-toggle').addEventListener('click', toggleChat);
  document.getElementById('chat-close').addEventListener('click', toggleChat);
  document.getElementById('chat-send').addEventListener('click', sendChatMessage);
  document.querySelectorAll('.chat-tab').forEach(tab => {
    tab.addEventListener('click', () => switchChatTab(tab.dataset.tab));
  });
  // チャット入力のフォーカス管理（ゲーム操作と干渉しないように）
  document.getElementById('chat-input').addEventListener('focus', () => { chatInputFocused = true; });
  document.getElementById('chat-input').addEventListener('blur', () => { chatInputFocused = false; });
  // 別タブ→戻ってきた時の通知管理
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && chatOpen) {
      if (chatTab === 'global') unreadGlobal = 0;
      else unreadDM = 0;
      updateChatBadge();
    }
  });
  </script>
</body>
</html>
